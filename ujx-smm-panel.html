<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UJX SMM Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080a0f;--bg2:#0d1017;--bg3:#121620;--bg4:#181c26;--bg5:#1e2330;
  --border:#ffffff08;--border2:#ffffff12;--border3:#ffffff20;--border4:#ffffff30;
  --text:#e8eaf2;--text2:#8b8fa8;--text3:#4a4e63;--text4:#2d3045;
  --accent:#00d4ff;--accent2:#00b8e0;--accent3:#0088aa;
  --accent-glow:#00d4ff18;--accent-glow2:#00d4ff08;
  --green:#00e676;--green-bg:#00e67610;--green-border:#00e67625;
  --red:#ff4757;--red-bg:#ff475710;--red-border:#ff475725;
  --amber:#ffb300;--amber-bg:#ffb30010;--amber-border:#ffb30025;
  --purple:#c084fc;--purple-bg:#c084fc10;
  --radius:8px;--radius-lg:12px;--radius-xl:16px;--radius-2xl:24px;
}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;font-size:14px;line-height:1.5}
h1,h2,h3,h4,h5,h6{font-family:'Outfit',sans-serif;line-height:1.2}
a{color:inherit;text-decoration:none}
button{font-family:'Outfit',sans-serif;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:'Outfit',sans-serif}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border3);border-radius:3px}
.app{display:flex;min-height:100vh}
.sidebar{width:240px;min-height:100vh;background:var(--bg2);border-right:1px solid var(--border2);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100;transition:transform .25s cubic-bezier(.4,0,.2,1)}
.sidebar-logo{padding:20px 16px;border-bottom:1px solid var(--border)}
.logo-wrap{display:flex;align-items:center;gap:10px;cursor:pointer}
/* UJX Logo SVG */
.logo-icon{width:38px;height:38px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.logo-text{font-family:'Outfit',sans-serif;font-weight:800;font-size:15px;letter-spacing:.5px;line-height:1.2}
.logo-text small{display:block;font-size:9px;font-weight:500;color:var(--text3);letter-spacing:2px;text-transform:uppercase}
.sidebar-nav{flex:1;padding:12px 8px;overflow-y:auto}
.nav-group{margin-bottom:20px}
.nav-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text4);padding:0 10px;margin-bottom:6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius);cursor:pointer;transition:all .15s;color:var(--text3);font-size:13px;font-weight:500;margin-bottom:1px;position:relative}
.nav-item:hover{background:var(--bg3);color:var(--text2)}
.nav-item.active{background:var(--accent-glow);color:var(--accent);border:1px solid var(--border3)}
.nav-item.active .nav-icon{color:var(--accent)}
.nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;font-family:'JetBrains Mono',monospace}
.sidebar-footer{padding:12px 8px;border-top:1px solid var(--border)}
.user-tile{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg3);border-radius:var(--radius-lg);cursor:pointer;border:1px solid var(--border)}
.user-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:#000;flex-shrink:0;font-family:'JetBrains Mono',monospace}
.user-info{flex:1;min-width:0}
.user-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:10px;color:var(--text3)}
.main{margin-left:240px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:50}
.topbar-left{display:flex;align-items:center;gap:12px;flex:1}
.hamburger{display:none;width:32px;height:32px;border-radius:var(--radius);background:var(--bg3);border:1px solid var(--border2);align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:var(--text2)}
.page-title{font-family:'Outfit',sans-serif;font-weight:700;font-size:15px;color:var(--text)}
.topbar-actions{display:flex;align-items:center;gap:8px}
.balance-pill{background:var(--green-bg);border:1px solid var(--green-border);color:var(--green);padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .15s}
.balance-pill:hover{background:var(--green-bg);border-color:var(--green)}
.icon-btn{width:32px;height:32px;border-radius:var(--radius);background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;color:var(--text2);transition:all .15s}
.icon-btn:hover{background:var(--bg4);color:var(--text);border-color:var(--border2)}
.page{flex:1;padding:20px;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.sidebar-overlay{display:none;position:fixed;inset:0;background:#000000a0;z-index:99}
.card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-xl);padding:18px}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-weight:700;font-size:14px;color:var(--text)}
.card-sub{font-size:12px;color:var(--text3);margin-top:2px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-xl);padding:16px 18px;transition:border-color .2s}
.stat-card:hover{border-color:var(--border3)}
.stat-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;margin-bottom:2px}
.stat-val.green{color:var(--green)}
.stat-val.cyan{color:var(--accent)}
.stat-val.amber{color:var(--amber)}
.stat-val.red{color:var(--red)}
.stat-hint{font-size:11px;color:var(--text3)}
.stat-icon{font-size:20px;margin-bottom:10px;display:block}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid transparent;white-space:nowrap;font-family:'Outfit',sans-serif}
.btn-primary{background:var(--accent);color:#000;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-outline{background:transparent;border-color:var(--border3);color:var(--text2)}
.btn-outline:hover{background:var(--bg3);color:var(--text);border-color:var(--border4)}
.btn-success{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.btn-success:hover{background:#00e67620}
.btn-danger{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.btn-danger:hover{background:#ff475720}
.btn-amber{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-lg{padding:11px 22px;font-size:15px;border-radius:var(--radius-lg)}
.btn-block{width:100%;justify-content:center}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.form-control{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 12px;color:var(--text);font-size:13px;transition:all .15s;outline:none;font-family:'Outfit',sans-serif}
.form-control:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-glow2)}
.form-control::placeholder{color:var(--text4)}
.form-control:disabled{opacity:.5;cursor:not-allowed}
select.form-control option{background:var(--bg2);color:var(--text)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-hint{font-size:11px;color:var(--text3);margin-top:4px}
.input-err{border-color:var(--red)!important}
.err-msg{font-size:11px;color:var(--red);margin-top:4px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.badge::before{content:'';width:4px;height:4px;border-radius:50%;flex-shrink:0}
.badge-success{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}.badge-success::before{background:var(--green)}
.badge-pending{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}.badge-pending::before{background:var(--amber)}
.badge-danger{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}.badge-danger::before{background:var(--red)}
.badge-info{background:var(--accent-glow);color:var(--accent);border:1px solid var(--border3)}.badge-info::before{background:var(--accent)}
.badge-gray{background:var(--bg4);color:var(--text3);border:1px solid var(--border)}.badge-gray::before{background:var(--text3)}
.tbl-wrap{overflow-x:auto;border-radius:var(--radius-lg);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;min-width:560px}
thead{background:var(--bg3)}
th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);white-space:nowrap;border-bottom:1px solid var(--border2)}
td{padding:11px 14px;font-size:12.5px;border-top:1px solid var(--border);vertical-align:middle;color:var(--text2)}
td strong{color:var(--text);font-weight:600}
tr:hover td{background:var(--bg3)08}
.mono{font-family:'JetBrains Mono',monospace;font-size:11px}
.tabs{display:flex;gap:2px;background:var(--bg3);border-radius:var(--radius-lg);padding:3px;margin-bottom:16px;overflow-x:auto}
.tab{padding:6px 14px;border-radius:var(--radius);font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;transition:all .15s;white-space:nowrap}
.tab.active{background:var(--bg2);color:var(--text);box-shadow:0 1px 4px #0004}
.modal-overlay{position:fixed;inset:0;background:#000000b0;display:flex;align-items:center;justify-content:center;z-index:600;animation:fadeUp .15s ease;padding:16px;backdrop-filter:blur(2px)}
.modal{background:var(--bg2);border:1px solid var(--border3);border-radius:var(--radius-2xl);padding:24px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-title{font-weight:800;font-size:16px}
.modal-close{width:28px;height:28px;border-radius:var(--radius);background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:14px}
.modal-close:hover{color:var(--text);background:var(--bg4)}
.toast-stack{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--bg2);border:1px solid var(--border3);border-radius:var(--radius-lg);padding:10px 14px;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:500;animation:toastIn .25s ease;box-shadow:0 4px 24px #000a;min-width:220px;max-width:320px;pointer-events:all}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.toast-icon{font-size:14px;flex-shrink:0}
.toast.success{border-left:3px solid var(--green)}
.toast.error{border-left:3px solid var(--red)}
.toast.info{border-left:3px solid var(--accent)}
.toast.warning{border-left:3px solid var(--amber)}
.pub-layout{min-height:100vh;background:var(--bg);display:flex;flex-direction:column}
.pub-nav{height:60px;background:var(--bg2)cc;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.pub-nav-links{display:flex;gap:2px}
.pub-nav-link{padding:6px 12px;border-radius:var(--radius);font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;transition:all .15s}
.pub-nav-link:hover{color:var(--text);background:var(--bg3)}
.pub-page{flex:1;display:flex;flex-direction:column}
.hero{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 32px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:800px;height:400px;background:radial-gradient(ellipse,var(--accent-glow2) 0%,transparent 70%);pointer-events:none}
.hero-chip{display:inline-flex;align-items:center;gap:6px;background:var(--accent-glow);border:1px solid var(--border3);color:var(--accent);padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:20px;text-transform:uppercase;letter-spacing:1px}
.hero-h1{font-family:'Outfit',sans-serif;font-weight:900;font-size:clamp(32px,5vw,64px);line-height:1.05;letter-spacing:-2px;margin-bottom:16px}
.hero-h1 .grad{background:linear-gradient(135deg,var(--accent) 0%,var(--purple) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-p{font-size:15px;color:var(--text2);max-width:520px;line-height:1.7;margin-bottom:32px}
.hero-cta{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.hero-stats{display:flex;gap:36px;margin-top:56px;flex-wrap:wrap;justify-content:center}
.hero-stat-val{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;color:var(--accent)}
.hero-stat-lbl{font-size:11px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:1px}
.features-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;padding:40px 32px;max-width:1100px;margin:0 auto;width:100%}
.feat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-xl);padding:22px;transition:all .25s}
.feat-card:hover{border-color:var(--border3);transform:translateY(-3px)}
.feat-icon{width:42px;height:42px;border-radius:var(--radius-lg);background:var(--accent-glow);display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:12px;border:1px solid var(--border3)}
.feat-title{font-weight:700;font-size:14px;margin-bottom:6px}
.feat-desc{font-size:12.5px;color:var(--text2);line-height:1.6}
.pub-footer{padding:28px 32px;border-top:1px solid var(--border);text-align:center}
.pub-footer p{font-size:12px;color:var(--text4)}
.auth-wrap{min-height:calc(100vh - 61px);display:flex;align-items:center;justify-content:center;padding:24px}
.auth-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-2xl);padding:32px;width:100%;max-width:400px}
.auth-logo{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:24px}
.auth-title{font-weight:900;font-size:22px;text-align:center;margin-bottom:4px;letter-spacing:-.5px}
.auth-sub{font-size:13px;color:var(--text3);text-align:center;margin-bottom:24px}
.auth-switch{text-align:center;margin-top:16px;font-size:12.5px;color:var(--text3)}
.auth-switch span{color:var(--accent);cursor:pointer;font-weight:600}
.auth-switch span:hover{color:var(--accent2)}
.divider-text{display:flex;align-items:center;gap:10px;margin:14px 0;color:var(--text4);font-size:11px}
.divider-text::before,.divider-text::after{content:'';flex:1;height:1px;background:var(--border)}
.admin-bar{background:#ff475708;border-bottom:1px solid var(--red-border);padding:5px 20px;display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.5px}
.price-box{background:var(--accent-glow);border:1px solid var(--border3);border-radius:var(--radius-lg);padding:14px;text-align:center;margin-top:12px}
.price-box .total{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;color:var(--accent)}
.qr-card{background:var(--bg3);border:2px dashed var(--border3);border-radius:var(--radius-xl);padding:24px;text-align:center}
.qr-img{width:180px;height:180px;margin:0 auto 12px;background:var(--bg4);border-radius:var(--radius-lg);overflow:hidden;display:flex;align-items:center;justify-content:center;border:2px solid var(--border3)}
.qr-img img{width:100%;height:100%;object-fit:contain}
.upi-id{font-family:'JetBrains Mono',monospace;font-size:13px;background:var(--bg4);padding:6px 14px;border-radius:var(--radius);display:inline-block;margin-top:8px;color:var(--accent);border:1px solid var(--border2)}
.upload-zone{background:var(--bg3);border:2px dashed var(--border2);border-radius:var(--radius-xl);padding:24px;text-align:center;cursor:pointer;transition:all .2s}
.upload-zone:hover,.upload-zone.dragging{border-color:var(--accent);background:var(--accent-glow2)}
.upload-icon{font-size:32px;margin-bottom:8px}
.progress{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}
.notif-item{display:flex;gap:10px;padding:10px 12px;background:var(--bg3);border-radius:var(--radius-lg);border-left:3px solid var(--accent);margin-bottom:6px}
.notif-item.success{border-left-color:var(--green)}
.notif-item.warning{border-left-color:var(--amber)}
.notif-item.danger{border-left-color:var(--red)}
.notif-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.notif-title{font-size:12.5px;font-weight:700;margin-bottom:1px;color:var(--text)}
.notif-desc{font-size:11px;color:var(--text3)}
.scrolly{overflow-y:auto;max-height:400px}
.svc-info{background:var(--bg3);border-radius:var(--radius-lg);overflow:hidden;margin:10px 0 14px;border:1px solid var(--border)}
.svc-info-row{display:flex;justify-content:space-between;padding:8px 12px;font-size:12px;border-bottom:1px solid var(--border)}
.svc-info-row:last-child{border-bottom:none}
.svc-key{color:var(--text3)}
.svc-val{font-weight:600;color:var(--text);font-family:'JetBrains Mono',monospace}
.empty-state{text-align:center;padding:40px;color:var(--text3)}
.empty-state .empty-icon{font-size:36px;margin-bottom:10px;display:block;opacity:.4}
@media(max-width:768px){
  .sidebar{transform:translateX(-260px)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .main{margin-left:0}
  .hamburger{display:flex}
  .form-grid{grid-template-columns:1fr}
  .hero{padding:50px 20px}
  .features-row{padding:24px 16px}
  .pub-nav{padding:0 16px}
  .pub-nav-links{display:none}
  .page{padding:14px}
  .stat-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:480px){
  .stat-grid{grid-template-columns:1fr}
  .hero-h1{font-size:28px;letter-spacing:-1px}
  .two-col{grid-template-columns:1fr!important}
}
.two-col{display:grid;grid-template-columns:1.3fr 1fr;gap:16px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast-stack" id="toast-stack"></div>
<script>
// ─── UJX SVG Logo Component ────────────────────────────────────────────────
function ujxLogoSVG(size=38){
  return `<svg width="${size}" height="${size}" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="ujxG1" x1="0" y1="0" x2="38" y2="38" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#00d4ff"/>
        <stop offset="100%" stop-color="#c084fc"/>
      </linearGradient>
      <linearGradient id="ujxG2" x1="0" y1="0" x2="38" y2="38" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.15"/>
        <stop offset="100%" stop-color="#c084fc" stop-opacity="0.15"/>
      </linearGradient>
    </defs>
    <!-- Outer hexagon-ish rounded shape -->
    <rect x="2" y="2" width="34" height="34" rx="9" fill="url(#ujxG2)" stroke="url(#ujxG1)" stroke-width="1.2"/>
    <!-- U shape -->
    <path d="M8 11 L8 21 Q8 27 14 27 Q20 27 20 21 L20 11" stroke="url(#ujxG1)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- J shape -->

function genId(prefix){return prefix+'_'+Date.now()+'_'+Math.random().toString(36).slice(2,6)}
function fmtMoney(v){return '₹'+parseFloat(v||0).toFixed(2)}

function validateEmail(e){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)||/^\d+@fam$/.test(e)}
function validatePass(p){return p&&p.length>=6}
function doLogin(email,password){email=(email||'').trim().toLowerCase();password=(password||'').trim();if(!email){toast('Please enter your email','error');return}if(!validateEmail(email)){toast('Please enter a valid email address','error');return}if(!password){toast('Please enter your password','error');return}const users=DB.getUsers();const u=users.find(x=>x.email===email&&x.password===password);if(!u){toast('Invalid email or password','error');return}if(u.status==='banned'){toast('Your account has been suspended. Contact support.','error');return}u.lastLogin=new Date().toISOString();DB.saveUsers(users);S.user=u;DB.saveSession({id:u.id,email:u.email});toast('Welcome back, '+u.name+'! 👋','success');navigate(u.role==='admin'?'admin-dash':'dash')}
function doRegister(name,email,password,confirmPass){name=(name||'').trim();email=(email||'').trim().toLowerCase();password=(password||'').trim();confirmPass=(confirmPass||'').trim();if(!name||name.length<2){toast('Please enter your full name (min 2 chars)','error');return}if(!validateEmail(email)){toast('Please enter a valid email address','error');return}if(!validatePass(password)){toast('Password must be at least 6 characters','error');return}if(password!==confirmPass){toast('Passwords do not match','error');return}const users=DB.getUsers();if(users.find(u=>u.email===email)){toast('An account with this email already exists','error');return}const newUser={id:genId('user'),name,email,password,role:'user',balance:0,totalSpent:0,status:'active',joined:new Date().toISOString().split('T')[0],lastLogin:new Date().toISOString()};users.push(newUser);DB.saveUsers(users);S.user=newUser;DB.saveSession({id:newUser.id,email:newUser.email});toast('Account created! Welcome to UJX SMM Panel 🎉','success');navigate('dash')}

function calcOrderPrice(serviceId,qty){const svcs=DB.getServices();const s=svcs.find(x=>x.id===serviceId);if(!s)return 0;return parseFloat(((s.rate/1000)*qty).toFixed(2))}
function placeOrder(){const{serviceId,link,quantity}=S.orderForm;if(!serviceId){toast('Please select a service','error');return}if(!link){toast('Please enter the target URL/link','error');return}if(!/^https?:\/\//i.test(link)){toast('Link must start with http:// or https://','error');return}const svcs=DB.getServices();const svc=svcs.find(s=>s.id===serviceId);if(!svc){toast('Service not found','error');return}if(!quantity||quantity<svc.min||quantity>svc.max){toast(`Quantity must be between ${svc.min} and ${svc.max}`,'error');return}const price=calcOrderPrice(serviceId,quantity);const users=DB.getUsers();const idx=users.findIndex(u=>u.id===S.user.id);if(idx<0){toast('Session error. Please login again.','error');return}if(users[idx].balance<price){toast('Insufficient balance. Please add funds.','error');return}users[idx].balance=parseFloat((users[idx].balance-price).toFixed(2));users[idx].totalSpent=parseFloat(((users[idx].totalSpent||0)+price).toFixed(2));DB.saveUsers(users);S.user=users[idx];const orders=DB.getOrders();const newOrder={id:'ORD-'+Date.now(),userId:S.user.id,userName:S.user.name,serviceId,serviceName:svc.name,category:svc.category,link,quantity,price,status:'pending',createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),apiOrderId:null};orders.unshift(newOrder);DB.saveOrders(orders);DB.addNotif(S.user.id,'info','Order Placed',`${svc.name} ×${quantity.toLocaleString()} — ${fmtMoney(price)}`);S.orderForm={serviceId:null,link:'',quantity:1000};toast('Order placed successfully! 🎉','success');autoSubmitOrderToAPI(newOrder);navigate('orders')}
async function autoSubmitOrderToAPI(order){const apis=DB.getApis();const active=apis.find(a=>a.status==='active'&&a.url&&a.key);if(!active)return;const svcs=DB.getServices();const svc=svcs.find(s=>s.id===order.serviceId);const apiServiceId=svc&&svc.apiServiceId;if(!apiServiceId)return;try{const params=new URLSearchParams({key:active.key,action:'add',service:apiServiceId,link:order.link,quantity:order.quantity});const resp=await fetch(active.url,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:params});const data=await resp.json();if(data.order){const orders=DB.getOrders();const idx=orders.findIndex(o=>o.id===order.id);if(idx>=0){orders[idx].apiOrderId=data.order;orders[idx].status='processing';DB.saveOrders(orders)}}}catch(e){}}
async function testAPIConnection(apiId){const apis=DB.getApis();const api=apis.find(a=>a.id===apiId);if(!api){toast('API not found','error');return}toast('Testing connection...','info');try{const params=new URLSearchParams({key:api.key,action:'balance'});const resp=await fetch(api.url,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:params,signal:AbortSignal.timeout(8000)});const data=await resp.json();if(data.error)throw new Error(data.error);const bal=data.balance??data.Balance??'?';const cur=data.currency??data.Currency??'';toast(`Connected! Balance: ${cur}${bal}`,'success');const idx=apis.findIndex(a=>a.id===apiId);if(idx>=0){apis[idx].remoteBalance=`${cur}${bal}`;apis[idx].status='active';DB.saveApis(apis);render()}}catch(e){toast('Connection failed: '+(e.message||'Unknown error'),'error');const idx=apis.findIndex(a=>a.id===apiId);if(idx>=0){apis[idx].status='error';DB.saveApis(apis);render()}}}
async function fetchAPIServices(apiId){const apis=DB.getApis();const api=apis.find(a=>a.id===apiId);if(!api){toast('API not found','error');return}toast('Fetching services from API...','info');try{const params=new URLSearchParams({key:api.key,action:'services'});const resp=await fetch(api.url,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:params,signal:AbortSignal.timeout(10000)});const data=await resp.json();if(!Array.isArray(data))throw new Error('Unexpected response');const existing=DB.getServices();let added=0;data.forEach(item=>{if(!existing.find(s=>s.apiServiceId==item.service)){existing.push({id:Date.now()+Math.random(),name:item.name||'Unnamed',category:item.category||'Other',min:parseInt(item.min)||10,max:parseInt(item.max)||100000,rate:parseFloat(item.rate)||0,speed:item.average_time||'Unknown',quality:'API Service',enabled:true,apiId:apiId,apiServiceId:item.service});added++}});DB.saveServices(existing);toast(`Synced! ${added} new services added.`,'success');render()}catch(e){toast('Fetch failed: '+(e.message||'Unknown error'),'error')}}
async function checkOrderAPIStatus(orderId){const orders=DB.getOrders();const order=orders.find(o=>o.id===orderId);if(!order||!order.apiOrderId){toast('No API order ID linked','info');return}const apis=DB.getApis();const api=apis.find(a=>a.status==='active'&&a.url&&a.key);if(!api){toast('No active API configured','error');return}toast('Checking status...','info');try{const params=new URLSearchParams({key:api.key,action:'status',order:order.apiOrderId});const resp=await fetch(api.url,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:params,signal:AbortSignal.timeout(8000)});const data=await resp.json();if(data.error)throw new Error(data.error);const statusMap={Pending:'pending','In progress':'processing',Completed:'completed',Partial:'partial',Canceled:'cancelled'};const newStatus=statusMap[data.status]||order.status;const idx=orders.findIndex(o=>o.id===orderId);if(idx>=0){orders[idx].status=newStatus;orders[idx].remains=data.remains;orders[idx].updatedAt=new Date().toISOString();DB.saveOrders(orders)}toast(`Status: ${data.status||newStatus}`,'success');render()}catch(e){toast('Status check failed: '+(e.message||'Unknown'),'error')}}
function submitPayment(amount,txnId,screenshotBase64){if(!amount||isNaN(amount)||parseFloat(amount)<10){toast('Enter a valid amount (min ₹10)','error');return}if(!txnId||txnId.length<5){toast('Enter a valid transaction/UTR ID','error');return}const payments=DB.getPayments();payments.unshift({id:'PAY-'+Date.now(),userId:S.user.id,userName:S.user.name,userEmail:S.user.email,amount:parseFloat(amount),txnId,screenshot:screenshotBase64||null,status:'pending',createdAt:new Date().toISOString(),reviewedAt:null});DB.savePayments(payments);DB.addNotif(S.user.id,'info','Payment Submitted',`₹${amount} — Pending admin approval`);toast('Payment submitted! Admin will verify within 15 minutes.','success');return true}
function adminApprovePayment(payId){const payments=DB.getPayments();const idx=payments.findIndex(p=>p.id===payId);if(idx<0)return;const p=payments[idx];if(p.status!=='pending'){toast('Payment already processed','info');return}const users=DB.getUsers();const uidx=users.findIndex(u=>u.id===p.userId);if(uidx<0){toast('User not found','error');return}users[uidx].balance=parseFloat((users[uidx].balance+p.amount).toFixed(2));DB.saveUsers(users);payments[idx].status='approved';payments[idx].reviewedAt=new Date().toISOString();DB.savePayments(payments);DB.addNotif(p.userId,'success','Payment Approved',`₹${p.amount} has been credited to your account.`);refreshUser();toast(`Payment approved! ₹${p.amount} credited to ${p.userName}.`,'success');render()}
function adminRejectPayment(payId){const payments=DB.getPayments();const idx=payments.findIndex(p=>p.id===payId);if(idx<0)return;payments[idx].status='rejected';payments[idx].reviewedAt=new Date().toISOString();DB.savePayments(payments);const p=payments[idx];DB.addNotif(p.userId,'danger','Payment Rejected',`Your payment of ₹${p.amount} was rejected. Contact support.`);toast(`Payment ${payId} rejected.`,'info');render()}

<div class="upload-zone" id="upzone" onclick="$i('file-inp').click()" ondragover="event.preventDefault();this.classList.add('dragging')" ondragleave="this.classList.remove('dragging')" ondrop="handleDrop(event)"><div class="upload-icon">📎</div><div style="font-weight:600;font-size:13px;margin-bottom:4px">Click or drag screenshot here</div><div style="font-size:11px;color:var(--text3)">PNG, JPG — max 3MB</div></div><input type="file" id="file-inp" accept="image/*" style="display:none" onchange="previewFile(this)"><div id="file-prev" style="margin-top:8px"></div></div><button class="btn btn-primary btn-lg btn-block" onclick="submitPaymentForm()">Submit for Verification</button></div></div><div style="display:flex;flex-direction:column;gap:12px"><div class="card"><div class="card-title" style="margin-bottom:8px">💰 Current Balance</div><div style="font-family:'JetBrains Mono',monospace;font-size:30px;font-weight:700;color:var(--green)">${fmtMoney(u.balance)}</div></div><div class="card"><div class="card-title" style="margin-bottom:10px">ℹ️ How to Add Funds</div><ol style="padding-left:18px;font-size:12px;color:var(--text2);line-height:2.2"><li>Scan QR code with any UPI app</li><li>Pay exact amount</li><li>Note the UTR/Transaction ID</li><li>Upload screenshot below</li><li>Admin verifies within 15 minutes</li></ol></div><div class="card"><div class="card-title" style="margin-bottom:10px">📋 Payment History</div>${myPayments.length===0?`<div class="empty-state" style="padding:16px"><span class="empty-icon">💳</span>No payments yet</div>`:myPayments.slice(0,5).map(p=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)"><div><div class="mono" style="font-size:11px">${p.id}</div><div style="font-size:10px;color:var(--text3)">${fmtDate(p.createdAt)}</div></div><div style="text-align:right"><div class="mono" style="font-weight:700">${fmtMoney(p.amount)}</div>${statusBadge(p.status)}</div></div>`).join('') function previewFile(input){const f=input.files[0];if(!f||f.size>3*1024*1024){toast('File too large. Max 3MB.','error');return}const reader=new FileReader();reader.onload=e=>{window._payScreenshot=e.target.result;const prev=$i('file-prev');if(prev)prev.innerHTML=`<div style="position:relative;display:inline-block"><img src="${e.target.result}" style="max-width:100%;max-height:180px;border-radius:var(--radius-lg);border:1px solid var(--border2)"><button onclick="$i('file-prev').innerHTML='';$i('file-inp').value='';window._payScreenshot=null" style="position:absolute;top:4px;right:4px;background:#000c;color:#fff;width:20px;height:20px;border-radius:50%;cursor:pointer;border:none;font-size:12px;display:flex;align-items:center;justify-content:center">×</button></div>`};reader.readAsDataURL(f)}
function handleDrop(e){e.preventDefault();const zone=$i('upzone');if(zone)zone.classList.remove('dragging');const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/')){const dt=new DataTransfer();dt.items.add(f);const inp=$i('file-inp');if(inp){inp.files=dt.files;previewFile(inp)}}}
function submitPaymentForm(){const amt=$v('pay-amt');const txn=$v('pay-txn');const ok=submitPayment(amt,txn,window._payScreenshot||null);if(ok){window._payScreenshot=null;render()}}
function buildNotifications(el){const u=currentUser();const notifs=DB.getNotifs(u.id);const updated=notifs.map(n=>({...n,read:true}));DB.saveNotifs(u.id,updated);el.innerHTML=`<div class="card"><div class="card-head"><div class="card-title">Notifications (${notifs.length})</div><button class="btn btn-outline btn-sm" onclick="DB.saveNotifs(S.user.id,[]);render()">Clear All</button></div>${notifs.length===0?`<div class="empty-state"><span class="empty-icon">🔔</span>No notifications yet</div>`:notifs.map(n=>`<div class="notif-item ${n.type}"><div class="notif-icon" style="font-size:16px">${notifIcon(n.type)}</div><div style="flex:1"><div class="notif-title">${n.title}</div><div class="notif-desc">${n.desc}</div></div><div style="font-size:10px;color:var(--text3)">${n.time}</div></div>`).join('')}</div>`}
function buildProfile(el){const u=currentUser();el.innerHTML=`<div class="two-col" style="align-items:start"><div class="card" style="text-align:center;padding:28px"><div style="width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;color:#000;margin:0 auto 12px;font-family:'JetBrains Mono',monospace">${(u.name||'U').split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase()}</div><div style="font-weight:900;font-size:18px;margin-bottom:4px">${u.name}</div><div style="font-size:12px;color:var(--text2);margin-bottom:12px">${u.email}</div><span class="badge badge-success">Active</span><div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:10px"><div style="background:var(--bg3);border-radius:var(--radius-lg);padding:10px"><div class="mono" style="font-size:18px;font-weight:700">${DB.getOrders().filter(o=>o.userId===u.id).length}</div><div style="font-size:10px;color:var(--text3)">Orders</div></div><div style="background:var(--bg3);border-radius:var(--radius-lg);padding:10px"><div class="mono" style="font-size:18px;font-weight:700">${fmtMoney(u.balance)}</div><div style="font-size:10px;color:var(--text3)">Balance</div></div></div></div><div class="card"><div class="card-title" style="margin-bottom:16px">Edit Profile</div><div class="form-grid"><div class="form-group"><label class="form-label">First Name</label><input class="form-control" id="prf-fn" value="${(u.name||'').split(' ')[0]||''}"></div><div class="form-group"><label class="form-label">Last Name</label><input class="form-control" id="prf-ln" value="${(u.name||'').split(' ').slice(1).join(' ')||''}"></div></div><div class="form-group"><label class="form-label">Email</label><input class="form-control" value="${u.email}" disabled></div><div style="height:1px;background:var(--border);margin:14px 0"></div><div class="card-title" style="margin-bottom:12px">Change Password</div><div class="form-group"><label class="form-label">Current Password</label><input class="form-control" id="prf-curpass" type="password" placeholder="••••••••"></div><div class="form-grid"><div class="form-group"><label class="form-label">New Password</label><input class="form-control" id="prf-newpass" type="password" placeholder="••••••••"></div><div class="form-group"><label class="form-label">Confirm</label><input class="form-control" id="prf-newpass2" type="password" placeholder="••••••••"></div></div><div style="display:flex;gap:8px"><button class="btn btn-primary" onclick="saveProfile()">Save Changes</button><button class="btn btn-outline" onclick="render()">Cancel</button></div></div></div>`}
function saveProfile(){const fn=$v('prf-fn');const ln=$v('prf-ln');const name=(fn+' '+ln).trim();const curpass=$v('prf-curpass');const newpass=$v('prf-newpass');const newpass2=$v('prf-newpass2');const users=DB.getUsers();const idx=users.findIndex(u=>u.id===S.user.id);if(idx<0)return;if(name.length>=2)users[idx].name=name;if(curpass||newpass){if(users[idx].password!==curpass){toast('Current password is incorrect','error');return}if(!validatePass(newpass)){toast('New password must be at least 6 characters','error');return}if(newpass!==newpass2){toast('Passwords do not match','error');return}users[idx].password=newpass}DB.saveUsers(users);S.user=users[idx];DB.saveSession({id:S.user.id,email:S.user.email});toast('Profile updated successfully!','success');render()}
function renderAdminPage(root){const pageMap={'admin-dash':buildAdminDash,'admin-users':buildAdminUsers,'admin-orders':buildAdminOrders,'admin-services':buildAdminServices,'admin-payments':buildAdminPayments,'admin-api':buildAdminAPI,'admin-analytics':buildAdminAnalytics,profile:buildProfile,notifications:buildNotifications};const buildFn=pageMap[S.page]||buildAdminDash;root.innerHTML=`${buildSidebar(true)}<div class="sidebar-overlay ${S.sidebarOpen?'open':''}" onclick="S.sidebarOpen=false;render()"></div><div class="main"><div class="admin-bar">🔐 Admin Mode — Full Control Panel</div>${buildTopbar()}<div class="page" id="page-area"></div></div>`;buildFn($i('page-area'))}
function buildAdminDash(el){const users=DB.getUsers().filter(u=>u.role!=='admin');const orders=DB.getOrders();const payments=DB.getPayments();const revenue=payments.filter(p=>p.status==='approved').reduce((a,p)=>a+p.amount,0);const pending=payments.filter(p=>p.status==='pending');el.innerHTML=`<div class="stat-grid"><div class="stat-card"><span class="stat-icon">👥</span><div class="stat-label">Total Users</div><div class="stat-val cyan">${users.length}</div><div class="stat-hint">${users.filter(u=>u.status==='active').length} active</div></div><div class="stat-card"><span class="stat-icon">📦</span><div class="stat-label">Total Orders</div><div class="stat-val">${orders.length}</div><div class="stat-hint">${orders.filter(o=>o.status==='pending').length} pending</div></div><div class="stat-card"><span class="stat-icon">💰</span><div class="stat-label">Revenue</div><div class="stat-val green">${fmtMoney(revenue)}</div><div class="stat-hint">Approved payments</div></div><div class="stat-card"><span class="stat-icon">⏳</span><div class="stat-label">Pending Payments</div><div class="stat-val amber">${pending.length}</div><div class="stat-hint">Need review</div></div></div>${pending.length>0?`<div class="card" style="margin-bottom:14px;border-color:var(--amber-border)"><div class="card-head"><div class="card-title">⚠ Pending Payments</div><button class="btn btn-outline btn-sm" onclick="navigate('admin-payments')">Review All</button></div>${pending.slice(0,3).map(p=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)"><div><strong>${p.userName}</strong> — <span class="mono">${p.id}</span><div style="font-size:11px;color:var(--text3)">${fmtDate(p.createdAt)}</div></div><div style="display:flex;gap:6px;align-items:center"><span class="mono">${fmtMoney(p.amount)}</span><button class="btn btn-success btn-sm" onclick="adminApprovePayment('${p.id}')">Approve</button><button class="btn btn-danger btn-sm" onclick="adminRejectPayment('${p.id}')">Reject</button></div></div>`).join('')}</div>`:''}<div class="two-col"><div class="card"><div class="card-head"><div class="card-title">Recent Orders</div><button class="btn btn-outline btn-sm" onclick="navigate('admin-orders')">View All</button></div>${orders.length===0?`<div class="empty-state"><span class="empty-icon">📦</span>No orders yet</div>`:orders.slice(0,5).map(o=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)"><div><strong style="font-size:12px">${o.serviceName}</strong><div class="mono" style="font-size:10px;color:var(--text3)">${o.id}</div></div><div style="text-align:right;display:flex;gap:8px;align-items:center"><span class="mono">${fmtMoney(o.price)}</span>${statusBadge(o.status)}</div></div>`).join('')}</div><div class="card"><div class="card-head"><div class="card-title">Recent Users</div><button class="btn btn-outline btn-sm" onclick="navigate('admin-users')">View All</button></div>${users.length===0?`<div class="empty-state"><span class="empty-icon">👥</span>No users yet</div>`:users.slice(0,5).map(u=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)"><div style="width:28px;height:28px;border-radius:50%;background:var(--accent-glow);border:1px solid var(--border3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--accent);flex-shrink:0">${(u.name||'U').split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase()}</div><div style="flex:1"><div style="font-size:12px;font-weight:600">${u.name}</div><div style="font-size:10px;color:var(--text3)">${u.email}</div></div><div style="text-align:right"><div class="mono" style="font-size:12px">${fmtMoney(u.balance)}</div>${statusBadge(u.status)}</div></div>`).join('')}</div></div>`}
function buildAdminUsers(el){const users=DB.getUsers().filter(u=>u.role!=='admin');el.innerHTML=`<div class="card"><div class="card-head"><div class="card-title">All Users (${users.length})</div></div>${users.length===0?`<div class="empty-state"><span class="empty-icon">👥</span>No users registered yet</div>`:`<div class="tbl-wrap" style="border:none"><table><thead><tr><th>User</th><th>Email</th><th>Balance</th><th>Orders</th><th>Last Login</th><th>Joined</th><th>Status</th><th>Actions</th></tr></thead><tbody>${users.map(u=>`<tr><td><div style="display:flex;align-items:center;gap:6px"><div style="width:26px;height:26px;border-radius:50%;background:var(--accent-glow);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--accent);flex-shrink:0">${(u.name||'U').split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase()}</div><strong>${u.name}</strong></div></td><td style="color:var(--text2);font-size:12px">${u.email}</td><td class="mono"><strong style="color:var(--green)">${fmtMoney(u.balance)}</strong></td><td class="mono">${DB.getOrders().filter(o=>o.userId===u.id).length}</td><td style="font-size:11px;color:var(--text3)">${u.lastLogin?fmtDate(u.lastLogin):'Never'}</td><td style="font-size:11px;color:var(--text3)">${fmtDate(u.joined)}</td><td>${statusBadge(u.status)}</td><td><div style="display:flex;gap:4px"><button class="btn btn-outline btn-sm" onclick="adminEditBalance('${u.id}')">Balance</button><button class="btn btn-${u.status==='active'?'danger':'success'} btn-sm" onclick="adminToggleUser('${u.id}')">${u.status==='active'?'Ban':'Unban'}</button></div></td></tr>`).join('')}</tbody></table></div>`}</div>`}
function adminToggleUser(id){const users=DB.getUsers();const idx=users.findIndex(u=>u.id===id);if(idx<0)return;users[idx].status=users[idx].status==='active'?'banned':'active';DB.saveUsers(users);toast(`User ${users[idx].status==='active'?'unbanned':'banned'}.`,'success');render()}
function adminEditBalance(id){const users=DB.getUsers();const u=users.find(x=>x.id===id);if(!u)return;const input=prompt(`Edit balance for ${u.name}\nCurrent: ₹${u.balance}\n\nEnter new balance (number):`);if(input===null)return;const val=parseFloat(input);if(isNaN(val)||val<0){toast('Invalid amount entered','error');return}const idx=users.findIndex(x=>x.id===id);users[idx].balance=val;DB.saveUsers(users);DB.addNotif(id,'info','Balance Updated',`Your balance has been updated to ₹${val} by admin.`);toast(`Balance updated to ₹${val}`,'success');render()}
function buildAdminOrders(el){const orders=DB.getOrders();const tabIdx=rstab('adm-orders');const tabs=['All','Pending','Processing','Completed','Partial','Cancelled'];const tabStatus=['all','pending','processing','completed','partial','cancelled'];const filtered=tabStatus[tabIdx]==='all'?orders:orders.filter(o=>o.status===tabStatus[tabIdx]);el.innerHTML=`<div class="card"><div class="card-head"><div class="card-title">All Orders (${orders.length})</div></div><div class="tabs">${tabs.map((t,i)=>`<div class="tab ${i===tabIdx?'active':''}" onclick="settab('adm-orders',${i})">${t}</div>`).join('')}</div>${filtered.length===0?`<div class="empty-state"><span class="empty-icon">📦</span>No orders found</div>`:`<div class="tbl-wrap" style="border:none"><table><thead><tr><th>ID</th><th>User</th><th>Service</th><th>Qty</th><th>Price</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead><tbody>${filtered.map(o=>`<tr><td class="mono" style="font-size:10px">${o.id}</td><td style="font-size:11px">${o.userName||'—'}</td><td><strong style="font-size:12px">${o.serviceName}</strong></td><td class="mono">${o.quantity.toLocaleString()}</td><td class="mono">${fmtMoney(o.price)}</td><td>${statusBadge(o.status)}</td><td style="font-size:10px;color:var(--text3)">${fmtDate(o.createdAt)}</td><td><div style="display:flex;gap:3px"><select style="background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:3px 6px;font-size:10px;color:var(--text);cursor:pointer" onchange="adminUpdateOrder('${o.id}',this.value)">${['pending','processing','completed','partial','cancelled'].map(s=>`<option value="${s}" ${o.status===s?'selected':''}>${s}</option>`).join('')}</select></div></td></tr>`).join('')}</tbody></table></div>`}</div>`}
function adminUpdateOrder(id,newStatus){const orders=DB.getOrders();const idx=orders.findIndex(o=>o.id===id);if(idx<0)return;orders[idx].status=newStatus;orders[idx].updatedAt=new Date().toISOString();DB.saveOrders(orders);DB.addNotif(orders[idx].userId,newStatus==='completed'?'success':'info','Order Updated',`Order ${id} is now ${newStatus}.`);toast(`Order ${id} updated to ${newStatus}`,'success');render()}
function buildAdminServices(el){const svcs=DB.getServices();const showForm=S['show_add_svc']||false;el.innerHTML=`<div class="card"><div class="card-head"><div class="card-title">Services (${svcs.length})</div><div style="display:flex;gap:8px"><button class="btn btn-outline btn-sm" onclick="S['show_add_svc']=!S['show_add_svc'];render()">+ Add Service</button></div></div>${showForm?`<div style="background:var(--bg3);border-radius:var(--radius-lg);padding:14px;margin-bottom:14px;border:1px solid var(--border2)"><div style="font-weight:700;margin-bottom:12px;font-size:13px">Add New Service</div><div class="form-grid"><div class="form-group"><label class="form-label">Service Name</label><input class="form-control" id="ns-name" placeholder="Instagram Followers"></div><div class="form-group"><label class="form-label">Category</label><input class="form-control" id="ns-cat" placeholder="Instagram"></div></div><div class="form-grid"><div class="form-group"><label class="form-label">Rate (₹ per 1000)</label><input class="form-control" id="ns-rate" type="number" step="0.01" placeholder="14.9"></div><div class="form-group"><label class="form-label">Min Order</label><input class="form-control" id="ns-min" type="number" placeholder="100"></div></div><div class="form-grid"><div class="form-group"><label class="form-label">Max Order</label><input class="form-control" id="ns-max" type="number" placeholder="100000"></div><div class="form-group"><label class="form-label">Quality</label><input class="form-control" id="ns-qual" placeholder="High Quality"></div></div><div class="form-group"><label class="form-label">Speed</label><input class="form-control" id="ns-speed" placeholder="0-24 hours"></div><div style="display:flex;gap:8px"><button class="btn btn-primary btn-sm" onclick="adminAddService()">Save Service</button><button class="btn btn-outline btn-sm" onclick="S['show_add_svc']=false;render()">Cancel</button></div></div>`:''}<div class="tbl-wrap" style="border:none"><table><thead><tr><th>#</th><th>Service</th><th>Category</th><th>Rate/1000</th><th>Min</th><th>Max</th><th>Status</th><th>Actions</th></tr></thead><tbody>${svcs.map(s=>`<tr><td class="mono" style="color:var(--text4);font-size:10px">${s.id}</td><td><strong>${s.name}</strong><div style="font-size:10px;color:var(--text3)">${s.quality}</div></td><td>${statusBadge2('info',s.category)}</td><td><strong style="color:var(--accent)">₹${s.rate}</strong></td><td class="mono">${s.min.toLocaleString()}</td><td class="mono">${s.max.toLocaleString()}</td><td>${statusBadge2(s.enabled?'success':'gray',s.enabled?'Active':'Off')}</td><td><div style="display:flex;gap:3px"><button class="btn btn-outline btn-sm" onclick="adminToggleService(${s.id})">${s.enabled?'Disable':'Enable'}</button><button class="btn btn-danger btn-sm" onclick="adminDeleteService(${s.id})">Del</button></div></td></tr>`).join('')}</tbody></table></div></div>`}
function adminAddService(){const name=$v('ns-name'),cat=$v('ns-cat'),rate=$v('ns-rate');if(!name||!cat||!rate){toast('Name, Category and Rate are required','error');return}const svcs=DB.getServices();svcs.push({id:Date.now(),name,category:cat,min:parseInt($v('ns-min'))||100,max:parseInt($v('ns-max'))||100000,rate:parseFloat(rate),speed:$v('ns-speed')||'0-24 hrs',quality:$v('ns-qual')||'HQ',enabled:true});DB.saveServices(svcs);S['show_add_svc']=false;toast('Service added!','success');render()}
function adminToggleService(id){const svcs=DB.getServices();const idx=svcs.findIndex(s=>s.id===id);if(idx<0)return;svcs[idx].enabled=!svcs[idx].enabled;DB.saveServices(svcs);toast(`Service ${svcs[idx].enabled?'enabled':'disabled'}`,'success');render()}
function adminDeleteService(id){if(!confirm('Delete this service?'))return;DB.saveServices(DB.getServices().filter(s=>s.id!==id));toast('Service deleted','success');render()}
function buildAdminPayments(el){const payments=DB.getPayments();const tabIdx=rstab('adm-pay');const tabs=['All','Pending','Approved','Rejected'];const tabStatus=['all','pending','approved','rejected'];const filtered=tabStatus[tabIdx]==='all'?payments:payments.filter(p=>p.status===tabStatus[tabIdx]);el.innerHTML=`<div class="card"><div class="card-head"><div class="card-title">Payment Verification (${payments.filter(p=>p.status==='pending').length} pending)</div></div><div class="tabs">${tabs.map((t,i)=>`<div class="tab ${i===tabIdx?'active':''}" onclick="settab('adm-pay',${i})">${t}</div>`).join('')}</div>${filtered.length===0?`<div class="empty-state"><span class="empty-icon">💳</span>No payments found</div>`:filtered.map(p=>`<div style="background:var(--bg3);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px;border:1px solid ${p.status==='pending'?'var(--amber-border)':p.status==='approved'?'var(--green-border)':'var(--red-border)'}"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px"><div><div style="font-weight:700;margin-bottom:3px">${p.userName} — <span class="mono">${fmtMoney(p.amount)}</span></div><div style="font-size:11px;color:var(--text2)">ID: <span class="mono">${p.id}</span> · UTR: <span class="mono">${p.txnId||'—'}</span></div><div style="font-size:10px;color:var(--text3)">${p.userEmail} · ${fmtDate(p.createdAt)}</div></div>${statusBadge(p.status)}</div><div style="background:var(--bg2);border-radius:var(--radius-lg);padding:10px;margin-bottom:10px;display:flex;align-items:center;gap:10px">${p.screenshot?`<img src="${p.screenshot}" style="width:56px;height:56px;border-radius:var(--radius);object-fit:cover;border:1px solid var(--border2);cursor:pointer" onclick="window.open('${p.screenshot}','_blank')" title="Click to view">`:`<div style="width:56px;height:56px;background:var(--bg4);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:20px;border:1px solid var(--border)">🖼️</div>`}<div><div style="font-size:12px;font-weight:600">Payment Screenshot</div><div style="font-size:10px;color:var(--text3)">${p.screenshot?'Click to view':'No screenshot uploaded'}</div></div></div>${p.status==='pending'?`<div style="display:flex;gap:8px"><button class="btn btn-success" onclick="adminApprovePayment('${p.id}')">✓ Approve & Credit ₹${p.amount}</button><button class="btn btn-danger" onclick="adminRejectPayment('${p.id}')">✗ Reject</button></div>`:`<div style="font-size:11px;color:var(--text3)">Reviewed: ${fmtDate(p.reviewedAt)}</div>`}</div>`).join('')}</div>`}
function buildAdminAPI(el){const apis=DB.getApis();const showForm=S['show_add_api']||false;el.innerHTML=`<div class="card" style="margin-bottom:14px"><div class="card-head"><div class="card-title">API Providers (${apis.length})</div><button class="btn btn-primary btn-sm" onclick="S['show_add_api']=!S['show_add_api'];render()">+ Add API</button></div>${apis.length===0?`<div class="empty-state"><span class="empty-icon">🔗</span>No APIs configured yet</div>`:apis.map(api=>`<div style="background:var(--bg3);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px;border:1px solid var(--border2)"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px"><div><div style="font-weight:700;margin-bottom:2px">${api.name}</div><div style="font-size:11px;color:var(--text2)">${api.url}</div>${api.remoteBalance?`<div style="font-size:11px;color:var(--green)">Remote Balance: ${api.remoteBalance}</div>`:''}</div>${statusBadge2(api.status==='active'?'success':api.status==='error'?'danger':'gray',api.status||'inactive')}</div><div style="font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--bg2);padding:6px 10px;border-radius:var(--radius);border:1px solid var(--border);margin-bottom:10px;color:var(--text2);word-break:break-all">${api.key}</div><div style="display:flex;gap:6px;flex-wrap:wrap"><button class="btn btn-outline btn-sm" onclick="testAPIConnection('${api.id}')">Test Connection</button><button class="btn btn-outline btn-sm" onclick="fetchAPIServices('${api.id}')">Sync Services</button><button class="btn btn-${api.status==='active'?'amber':'success'} btn-sm" onclick="toggleAPIStatus('${api.id}')">${api.status==='active'?'Deactivate':'Activate'}</button><button class="btn btn-danger btn-sm" onclick="adminDeleteAPI('${api.id}')">Delete</button></div></div>`).join('')}</div>${showForm?`<div class="card"><div class="card-title" style="margin-bottom:14px">Add New API Provider</div><div class="form-group"><label class="form-label">Provider Name</label><input class="form-control" id="api-name" placeholder="My SMM Provider"></div><div class="form-group"><label class="form-label">API Endpoint URL</label><input class="form-control" id="api-url" type="url" placeholder="https://api.provider.com/v2"></div><div class="form-group"><label class="form-label">API Key</label><input class="form-control" id="api-key" placeholder="Your API key"></div><div style="display:flex;gap:8px"><button class="btn btn-primary" onclick="adminAddAPI()">Save Provider</button><button class="btn btn-outline" onclick="S['show_add_api']=false;render()">Cancel</button></div></div>`:''}`}
function adminAddAPI(){const name=$v('api-name'),url=$v('api-url'),key=$v('api-key');if(!name||!url||!key){toast('All fields are required','error');return}if(!url.startsWith('http')){toast('URL must start with http:// or https://','error');return}const apis=DB.getApis();apis.push({id:genId('api'),name,url,key,status:'inactive',addedAt:new Date().toISOString()});DB.saveApis(apis);S['show_add_api']=false;toast('API provider added!','success');render()}
function toggleAPIStatus(id){const apis=DB.getApis();const idx=apis.findIndex(a=>a.id===id);if(idx<0)return;apis[idx].status=apis[idx].status==='active'?'inactive':'active';DB.saveApis(apis);toast(`API ${apis[idx].status==='active'?'activated':'deactivated'}`,'success');render()}
function adminDeleteAPI(id){if(!confirm('Delete this API provider?'))return;DB.saveApis(DB.getApis().filter(a=>a.id!==id));toast('API deleted','success');render()}
function buildAdminAnalytics(el){const users=DB.getUsers().filter(u=>u.role!=='admin');const orders=DB.getOrders();const payments=DB.getPayments();const revenue=payments.filter(p=>p.status==='approved').reduce((a,p)=>a+p.amount,0);const totalOrders=orders.length;const completedOrders=orders.filter(o=>o.status==='completed').length;const svcMap={};orders.forEach(o=>{svcMap[o.serviceName]=(svcMap[o.serviceName]||0)+o.price});const topSvcs=Object.entries(svcMap).sort((a,b)=>b[1]-a[1]).slice(0,5);const maxRev=topSvcs[0]?topSvcs[0][1]:1;el.innerHTML=`<div class="stat-grid"><div class="stat-card"><span class="stat-icon">💰</span><div class="stat-label">Total Revenue</div><div class="stat-val green">${fmtMoney(revenue)}</div><div class="stat-hint">Approved payments</div></div><div class="stat-card"><span class="stat-icon">📦</span><div class="stat-label">Total Orders</div><div class="stat-val cyan">${totalOrders}</div><div class="stat-hint">${completedOrders} completed</div></div><div class="stat-card"><span class="stat-icon">👥</span><div class="stat-label">Total Users</div><div class="stat-val">${users.length}</div><div class="stat-hint">${users.filter(u=>u.status==='active').length} active</div></div><div class="stat-card"><span class="stat-icon">💎</span><div class="stat-label">Avg Order</div><div class="stat-val amber">${totalOrders?fmtMoney(orders.reduce((a,o)=>a+o.price,0)/totalOrders):'₹0.00'}</div><div class="stat-hint">Per order</div></div></div><div class="two-col"><div class="card"><div class="card-title" style="margin-bottom:14px">Top Services by Revenue</div>${topSvcs.length===0?`<div class="empty-state" style="padding:20px"><span class="empty-icon">📊</span>No data yet</div>`:topSvcs.map(([name,rev])=>`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>${name}</span><span class="mono" style="font-weight:700">${fmtMoney(rev)}</span></div><div class="progress"><div class="progress-fill" style="width:${Math.round(rev/maxRev*100)}%"></div></div></div>`).join('')}</div><div class="card"><div class="card-title" style="margin-bottom:14px">Order Status Breakdown</div>${['pending','processing','completed','partial','cancelled'].map(s=>{const cnt=orders.filter(o=>o.status===s).length;const pct=totalOrders?Math.round(cnt/totalOrders*100):0;return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)"><div style="display:flex;align-items:center;gap:8px">${statusBadge(s)}<span style="font-size:12px;color:var(--text2)">${cnt} orders</span></div><span class="mono" style="font-size:12px">${pct}%</span></div>`}).join('')}</div></div>`}
render();
</script>
</body>
</html>
